train:
  domain_points: 50000
  bc_points: 1600
  crack_points: 1600
  crack_face_points: 800
  sym_axis_points: 1200   # Points on x=0 for symmetry BC
  num_steps: 10
  am_iters: 5
  v_max: 0.003
  u_lr: 0.001
  u_steps: 800
  phi_lr: 0.0015
  phi_steps: 800

model:
  u_in_dim: 4            # [x, y, mu, nu]
  phi_in_dim: 2          # [x, y]
  u_out_dim: 2           # [u, v]
  phi_out_dim: 1
  hidden_layers: 4
  hidden_neurons: 64

physics:
  W: 1.0
  H: 1.0
  a: 0.1
  E: 210000.0            # MPa (N/mm^2)
  nu: 0.3
  G_c: 2.7               # N/mm (or MPa * mm)  <- Fixed from 0.0027 kN/mm to match MPa
  l_0: 0.01              # mm
  k: 1.0e-5              # Residual stiffness

weighting:
  w_pde_u: 1.0
  w_bc_u: 100.0
  w_crack_face: 20.0
  w_sym: 50.0            # Weight for x=0 symmetry axis BC
  w_pde_phi: 1.0
